<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ayarlar — şirketiniyorumla.com</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --p-dk:#0D5C55;--p-md:#0F766E;--p-lt:#14B8A6;
  --p-pal:#CCFBF1;--p-mid:#5EEAD4;
  --accent:#22C55E;--blue:#3B82F6;--blue-pal:#EFF6FF;
  --bg:#F8FAFC;--surface:#fff;--border:#E2E8F0;
  --text:#111827;--text2:#6B7280;--text3:#9CA3AF;
  --radius:8px;--radius-lg:12px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:100}
.logo{font-size:20px;font-weight:800;color:#0D5C55;letter-spacing:-0.8px;text-decoration:none}
.logo span{color:var(--p-lt)}
.nav-links{display:flex;gap:24px}
.nav-links a{font-size:14px;color:#111827;text-decoration:none;cursor:pointer;font-weight:600}
.nav-links a:hover{color:var(--p-md)}
.nav-right{display:flex;gap:8px;align-items:center}
.user-menu{position:relative}
.user-avatar{width:34px;height:34px;border-radius:50%;background:var(--p-pal);color:var(--p-dk);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;cursor:pointer;border:2px solid var(--p-mid)}
.user-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:0 8px 24px rgba(0,0,0,0.1);min-width:200px;z-index:100;display:none;overflow:hidden}
.user-dropdown.open{display:block}
.user-dropdown a{display:block;padding:10px 16px;font-size:13px;color:var(--text2);cursor:pointer;font-weight:500}
.user-dropdown a:hover{background:var(--bg)}
.user-dropdown .divider{height:1px;background:var(--border)}

.page-header{background:var(--surface);border-bottom:1px solid var(--border);padding:1.5rem 2rem}
.page-header-inner{max-width:680px;margin:0 auto}
.back-link{font-size:13px;color:var(--text2);text-decoration:none;display:flex;align-items:center;gap:6px;margin-bottom:8px;font-weight:500}
.back-link:hover{color:var(--text)}
.page-header h1{font-size:22px;font-weight:700;letter-spacing:-0.3px}
.page-header p{font-size:14px;color:var(--text2);margin-top:4px;font-weight:400}

.content{max-width:680px;margin:0 auto;padding:2rem}

.settings-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:16px;overflow:hidden}
.settings-section-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.settings-section-header h3{font-size:15px;font-weight:700}
.settings-section-header p{font-size:12px;color:var(--text2);font-weight:400;margin-top:2px}
.settings-section-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.settings-section-body{padding:1.25rem 1.5rem}
.fg{margin-bottom:16px}
.fg:last-child{margin-bottom:0}
.fg label{display:block;font-size:12px;font-weight:700;margin-bottom:6px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px}
.fg input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius);font-family:'Inter',sans-serif;font-size:14px;outline:none;color:var(--text);transition:border-color 0.15s;background:#fff}
.fg input:focus{border-color:var(--p-lt)}
.fg input:disabled{background:var(--bg);color:var(--text3);cursor:not-allowed}
.fg .hint{font-size:11px;color:var(--text3);margin-top:5px;font-weight:500}
.save-btn{background:var(--p-md);color:#fff;border:none;padding:10px 24px;border-radius:var(--radius);font-size:14px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;transition:background 0.15s;margin-top:4px}
.save-btn:hover{background:var(--p-dk)}
.save-btn:disabled{background:#CBD5E1;cursor:not-allowed}

.danger-section{border:1.5px solid #FECACA;border-radius:var(--radius-lg);padding:1.25rem 1.5rem;margin-bottom:16px}
.danger-section h3{font-size:15px;font-weight:700;color:#DC2626;margin-bottom:6px}
.danger-section p{font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.6}
.danger-btn{background:#DC2626;color:#fff;border:none;padding:9px 20px;border-radius:var(--radius);font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600}
.danger-btn:hover{background:#B91C1C}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:12px 24px;border-radius:10px;font-size:14px;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,0.2)}
.toast.show{opacity:1}
.error-toast{background:#DC2626}
.footer{background:#111827;color:#6B7280;text-align:center;padding:2rem;font-size:13px;font-weight:500;margin-top:2rem}
.footer strong{color:#F9FAFB;font-weight:700}
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);z-index:100;padding:8px 0}
.mobile-nav-inner{display:flex;justify-content:space-around;max-width:500px;margin:0 auto}
.mobile-nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:4px 12px;font-family:'Inter',sans-serif;color:var(--text2);text-decoration:none}
.mobile-nav-btn span.lbl{font-size:10px;font-weight:600}
@media(max-width:700px){.mobile-nav{display:block}body{padding-bottom:70px}.nav-links{display:none}}
</style>
</head>
<body>

<nav class="nav">
  <a class="logo" href="index.html">şirketini<span>yorumla</span></a>
  <div class="nav-links">
    <a href="index.html">Şirketler</a>
    <a href="forum.html">Forum</a>
  </div>
  <div class="nav-right" id="navRight"></div>
</nav>

<div class="page-header">
  <div class="page-header-inner">
    <a class="back-link" href="profile.html">← Profilime dön</a>
    <h1>Hesap Ayarları</h1>
    <p>Profil bilgilerini ve hesap güvenliğini buradan yönet.</p>
  </div>
</div>

<div class="content" id="pageContent">
  <div style="text-align:center;padding:3rem;color:var(--text2)">Yükleniyor...</div>
</div>

<div class="toast" id="tst"></div>
<footer class="footer"><strong>şirketiniyorumla.com</strong> &nbsp;·&nbsp; © 2026</footer>

<div class="mobile-nav"><div class="mobile-nav-inner">
  <a class="mobile-nav-btn" href="index.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg><span class="lbl">Şirketler</span></a>
  <a class="mobile-nav-btn" href="forum.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span class="lbl">Forum</span></a>
  <a class="mobile-nav-btn" href="profile.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span class="lbl">Profil</span></a>
</div></div>

<script>
var sb=window.supabase.createClient(
  'https://lduzxgmmmzldigbvzmpt.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxkdXp4Z21tbXpsZGlnYnZ6bXB0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODYzMDYsImV4cCI6MjA4OTg2MjMwNn0.7jlnzw7mHe5g2tnLHJYdyk5QBQKWtDQknQCrZplvHDg',
  {auth:{storageKey:'sirketiniyorumla-auth',storage:window.localStorage}}
);

var currentUser=null,currentProfile=null;

function showToast(msg,err){var t=document.getElementById('tst');t.textContent=msg;t.className='toast'+(err?' error-toast':'')+' show';setTimeout(function(){t.className='toast';},3500);}

async function initAuth(){
  var s=await sb.auth.getSession();
  if(!s.data.session){window.location.href='index.html';return;}
  await onLogin(s.data.session.user);
  sb.auth.onAuthStateChange(async function(ev,session){
    if(session)await onLogin(session.user);
    else window.location.href='index.html';
  });
}

async function onLogin(user){
  currentUser=user;
  var p=await sb.from('profiles').select('*').eq('id',user.id).single();
  currentProfile=p.data;
  renderNav();
  renderSettings();
}

function renderNav(){
  var nr=document.getElementById('navRight');
  if(!currentUser)return;
  var uname=currentProfile&&currentProfile.username?currentProfile.username:currentUser.email.split('@')[0];
  nr.innerHTML='<div class="user-menu"><div class="user-avatar" onclick="toggleDD()">'+uname.substring(0,2).toUpperCase()+'</div>'+
    '<div class="user-dropdown" id="userDD">'+
    '<a href="profile.html" style="font-weight:700;color:var(--text)">'+uname+'</a>'+
    '<div class="divider"></div>'+
    '<a href="index.html">Ana Sayfa</a>'+
    '<a href="profile.html">👤 Profilim</a>'+
    '<a href="settings.html" style="color:var(--p-md);font-weight:600">⚙️ Ayarlar</a>'+
    '<div class="divider"></div>'+
    '<a onclick="doLogout()" style="color:#DC2626">Çıkış Yap</a>'+
    '</div></div>';
}
function toggleDD(){var d=document.getElementById('userDD');if(d)d.classList.toggle('open');}
async function doLogout(){await sb.auth.signOut();window.location.href='index.html';}

function renderSettings(){
  var uname=currentProfile&&currentProfile.username?currentProfile.username:'';
  var title=currentProfile&&currentProfile.title?currentProfile.title:'';
  var company=currentProfile&&currentProfile.company?currentProfile.company:'';
  var email=currentUser?currentUser.email:'';

  var html='';

  // Profil bilgileri
  html+='<div class="settings-section">';
  html+='<div class="settings-section-header"><div class="settings-section-icon" style="background:#F0FDF4">👤</div><div><h3>Profil Bilgileri</h3><p>Kullanıcı adı, unvan ve şirket bilgilerini güncelle</p></div></div>';
  html+='<div class="settings-section-body">';
  html+='<div class="fg"><label>Kullanıcı Adı</label><input type="text" id="set-username" value="'+uname+'" placeholder="Kullanıcı adınız"><div class="hint">Yorumlarınızda isimli paylaşımda bu ad görünür.</div></div>';
  html+='<div class="fg"><label>Unvan / Meslek</label><input type="text" id="set-title" value="'+title+'" placeholder="Örn: Yazılım Geliştirici, Müdür..."><div class="hint">Anonim yorumlarınızda unvanınız görünür.</div></div>';
  html+='<div class="fg"><label>Çalıştığınız Şirket <span style="color:var(--text3);font-weight:400">(isteğe bağlı)</span></label><input type="text" id="set-company" value="'+company+'" placeholder="Örn: Google, Türk Telekom..."></div>';
  html+='<button class="save-btn" id="profile-save-btn" onclick="saveProfile()">Değişiklikleri Kaydet</button>';
  html+='</div></div>';

  // E-posta
  html+='<div class="settings-section">';
  html+='<div class="settings-section-header"><div class="settings-section-icon" style="background:#EFF6FF">✉️</div><div><h3>E-posta</h3><p>Hesabınıza bağlı e-posta adresi</p></div></div>';
  html+='<div class="settings-section-body">';
  html+='<div class="fg"><label>E-posta Adresi</label><input type="text" value="'+email+'" disabled><div class="hint">E-posta adresi değiştirilemez.</div></div>';
  html+='</div></div>';

  // Şifre
  html+='<div class="settings-section">';
  html+='<div class="settings-section-header"><div class="settings-section-icon" style="background:#FEF3C7">🔒</div><div><h3>Şifre Değiştir</h3><p>Hesap güvenliğin için güçlü bir şifre kullan</p></div></div>';
  html+='<div class="settings-section-body">';
  html+='<div class="fg"><label>Yeni Şifre</label><input type="password" id="set-password" placeholder="En az 6 karakter"></div>';
  html+='<div class="fg"><label>Yeni Şifre (Tekrar)</label><input type="password" id="set-password2" placeholder="Şifreyi tekrar girin"></div>';
  html+='<button class="save-btn" onclick="savePassword()">Şifreyi Güncelle</button>';
  html+='</div></div>';

  // Tehlikeli bölge
  html+='<div class="danger-section">';
  html+='<h3>Tehlikeli Bölge</h3>';
  html+='<p>Hesabınızı silmek tüm yorumlarınızı, maaş verilerinizi ve kişisel bilgilerinizi kalıcı olarak siler. Bu işlem geri alınamaz.</p>';
  html+='<button class="danger-btn" onclick="deleteAccount()">Hesabı Kalıcı Olarak Sil</button>';
  html+='</div>';

  document.getElementById('pageContent').innerHTML=html;
}

async function saveProfile(){
  var btn=document.getElementById('profile-save-btn');
  var username=document.getElementById('set-username').value.trim();
  var title=document.getElementById('set-title').value.trim();
  var company=document.getElementById('set-company').value.trim();
  if(!username){showToast('Kullanıcı adı boş olamaz.',true);return;}
  btn.disabled=true;btn.textContent='Kaydediliyor...';
  try{
    var r=await sb.from('profiles').update({username:username,title:title||null,company:company||null}).eq('id',currentUser.id);
    if(r.error)throw r.error;
    currentProfile.username=username;currentProfile.title=title;currentProfile.company=company;
    showToast('✓ Profil güncellendi!');
    renderNav();
  }catch(e){showToast('Bir hata oluştu.',true);}
  btn.disabled=false;btn.textContent='Değişiklikleri Kaydet';
}

async function savePassword(){
  var p1=document.getElementById('set-password').value;
  var p2=document.getElementById('set-password2').value;
  if(!p1||p1.length<6){showToast('Şifre en az 6 karakter olmalı.',true);return;}
  if(p1!==p2){showToast('Şifreler eşleşmiyor.',true);return;}
  try{
    var r=await sb.auth.updateUser({password:p1});
    if(r.error)throw r.error;
    showToast('✓ Şifre güncellendi!');
    document.getElementById('set-password').value='';
    document.getElementById('set-password2').value='';
  }catch(e){showToast('Şifre güncellenemedi.',true);}
}

async function deleteAccount(){
  if(!confirm('Hesabınızı silmek istediğinize emin misiniz? Bu işlem geri alınamaz.'))return;
  try{
    await sb.from('profiles').delete().eq('id',currentUser.id);
    await sb.auth.signOut();
    window.location.href='index.html';
  }catch(e){showToast('Hesap silinemedi.',true);}
}

document.addEventListener('click',function(e){if(!e.target.closest('.user-menu')){var dd=document.getElementById('userDD');if(dd)dd.classList.remove('open');}});

initAuth();
</script>
</body>
</html>
