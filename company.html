<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Şirket Yorumları — şirketiniyorumla.com</title>
<meta name="description" content="Şirket değerlendirmeleri, maaş bilgileri ve çalışan yorumları.">
<meta property="og:title" content="Şirket Yorumları — şirketiniyorumla.com">
<meta property="og:description" content="Şirket değerlendirmeleri, maaş bilgileri ve çalışan yorumları.">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<meta id="meta-desc" name="description" content="">
<meta id="og-title" property="og:title" content="">
<meta id="og-desc" property="og:description" content="">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --p-dk:#0D5C55;--p-md:#0F766E;--p-lt:#14B8A6;
  --p-pal:#CCFBF1;--p-mid:#5EEAD4;
  --accent:#22C55E;--blue:#3B82F6;--blue-pal:#EFF6FF;
  --bg:#F3F2F0;--surface:#fff;--border:#E4E2DF;
  --text:#1C1C1C;--text2:#6B6B6B;--text3:#ADADAD;
  --radius:6px;--radius-lg:10px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* NAV */
.nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
.logo{font-family:'Inter',sans-serif;font-size:20px;font-weight:800;color:#0D5C55;letter-spacing:-0.8px;text-decoration:none}
.logo span{color:var(--p-lt)}
.nav-links{display:flex;gap:28px}
.nav-links a{font-size:14px;color:var(--text2);text-decoration:none;cursor:pointer;font-weight:500;transition:color 0.15s}
.nav-links a:hover{color:var(--text)}
.nav-right{display:flex;gap:8px;align-items:center}
.btn-ghost{background:none;color:var(--text2);border:1px solid var(--border);padding:7px 16px;border-radius:var(--radius);font-size:14px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:500}
.btn-ghost:hover{border-color:var(--text2)}
.btn-primary{background:#1C1C1C;color:#fff;border:none;padding:8px 18px;border-radius:var(--radius);font-size:14px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600}
.btn-primary:hover{background:#333}
.user-menu{position:relative}
.user-avatar{width:32px;height:32px;border-radius:50%;background:var(--p-pal);color:var(--p-dk);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;border:2px solid var(--p-mid)}
.user-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:0 8px 24px rgba(0,0,0,0.1);min-width:190px;z-index:100;display:none;overflow:hidden}
.user-dropdown.open{display:block}
.user-dropdown a{display:block;padding:10px 16px;font-size:13px;color:var(--text2);cursor:pointer;font-weight:500}
.user-dropdown a:hover{background:var(--bg)}
.user-dropdown .divider{height:1px;background:var(--border)}

/* COVER */
.company-cover{height:220px;position:relative;overflow:hidden}
.company-cover-bg{position:absolute;inset:0;background:linear-gradient(135deg,#0a2e2b 0%,#0F766E 40%,#14B8A6 70%,#5EEAD4 100%)}
.company-cover-pattern{position:absolute;inset:0;opacity:0.07;background-image:radial-gradient(circle at 20% 50%,#fff 1px,transparent 1px),radial-gradient(circle at 80% 20%,#fff 1px,transparent 1px),radial-gradient(circle at 60% 80%,#fff 1px,transparent 1px);background-size:40px 40px,60px 60px,80px 80px}
.company-cover-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(0,0,0,0.3) 100%)}

/* COMPANY HEADER */
.company-header-wrap{background:var(--surface);border-bottom:1px solid var(--border)}
.company-header-inner{max-width:1100px;margin:0 auto;padding:0 2rem}
.company-logo-wrap{display:flex;align-items:flex-end;gap:20px;margin-top:-52px;padding-bottom:16px;flex-wrap:wrap}
.company-logo-big{width:96px;height:96px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:28px;flex-shrink:0;border:4px solid #fff;box-shadow:0 4px 20px rgba(0,0,0,0.15);background:#fff;position:relative;z-index:2}
.company-title-row{display:flex;align-items:flex-end;justify-content:space-between;flex:1;flex-wrap:wrap;gap:12px;padding-bottom:8px;padding-top:52px}
.company-name{font-family:'Inter',sans-serif;font-size:28px;font-weight:800;letter-spacing:-0.5px;margin-bottom:6px}
.company-badges{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.company-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:4px 12px;border-radius:20px;font-weight:600;border:1px solid var(--border);color:var(--text2);background:var(--bg)}
.company-badge.verified{background:#F0FDF4;color:#15803D;border-color:#BBF7D0}
.company-actions{display:flex;gap:10px;align-items:center}
.btn-review{background:var(--p-md);color:#fff;border:none;padding:10px 22px;border-radius:var(--radius);font-size:14px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:700;box-shadow:0 2px 8px rgba(15,118,110,0.3);transition:all 0.15s}
.btn-review:hover{background:var(--p-dk);box-shadow:0 4px 16px rgba(15,118,110,0.4);transform:translateY(-1px)}
.btn-follow{background:var(--surface);color:var(--text);border:1.5px solid var(--border);padding:9px 20px;border-radius:var(--radius);font-size:14px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;transition:all 0.15s}
.btn-follow:hover{background:var(--bg);border-color:var(--p-lt)}
.btn-follow.following{background:var(--p-pal);color:var(--p-dk);border-color:var(--p-mid)}

/* TABS */
.company-tabs{border-top:1px solid var(--border)}
.tabs-inner{display:flex;gap:0}
.tab-btn{padding:14px 20px;font-size:14px;font-weight:600;color:var(--text2);border-bottom:2px solid transparent;cursor:pointer;background:none;border-top:none;border-left:none;border-right:none;font-family:'Inter',sans-serif;transition:all 0.15s}
.tab-btn.active{color:var(--p-md);border-bottom-color:var(--p-md)}
.tab-btn:hover:not(.active){color:var(--text)}

/* CONTENT */
.page-content{max-width:1100px;margin:0 auto;padding:1.5rem 2rem;display:grid;grid-template-columns:1fr 320px;gap:1.5rem;align-items:start}

/* SNAPSHOT CARD */
.snapshot-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:1rem}
.snapshot-title{font-family:'Inter',sans-serif;font-size:18px;margin-bottom:1.25rem}
.snapshot-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.25rem}
.snapshot-item{display:flex;align-items:center;gap:12px}
.snapshot-icon{font-size:20px;flex-shrink:0}
.snapshot-val{font-size:22px;font-weight:700;color:var(--text)}
.snapshot-label{font-size:12px;color:var(--text2);font-weight:500}
.snapshot-divider{height:1px;background:var(--border);margin:1.25rem 0}
.snapshot-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-top:1px solid var(--border);padding-top:1.25rem}
.snapshot-stat{text-align:center;padding:0 1rem;border-right:1px solid var(--border)}
.snapshot-stat:last-child{border-right:none}
.snapshot-stat-val{font-size:15px;font-weight:700;color:var(--text);margin-bottom:3px}
.snapshot-stat-label{font-size:11px;color:var(--text2);font-weight:500}

/* RATING CARD */
.rating-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:1rem}
.rating-big{font-size:52px;font-weight:700;color:var(--text);line-height:1;margin-bottom:6px}
.rating-stars{margin-bottom:6px}
.rating-count{font-size:13px;color:var(--text2);font-weight:500;margin-bottom:1rem}
.rating-rec{font-size:14px;font-weight:700;color:var(--text);margin-bottom:1rem}
.rating-rec span{color:var(--accent)}
.sub-bars{display:flex;flex-direction:column;gap:8px}
.sub-bar-row{display:flex;align-items:center;gap:10px;font-size:12px;font-weight:500}
.sub-bar-label{width:90px;color:var(--text2);flex-shrink:0}
.sub-bar-track{flex:1;height:5px;background:#F1F5F9;border-radius:3px;overflow:hidden}
.sub-bar-fill{height:100%;background:#22C55E;border-radius:3px}
.sub-bar-val{width:20px;text-align:right;font-weight:700;color:var(--text)}

/* REVIEW CARD */
.reviews-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.reviews-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.reviews-header h3{font-size:18px;font-weight:700}
.rev-card{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border)}
.rev-card:last-child{border-bottom:none}
.rev-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.rev-score{font-size:24px;font-weight:700;color:var(--text)}
.rev-title{font-size:15px;font-weight:700;margin-bottom:4px}
.rev-meta{font-size:12px;color:var(--text2);font-weight:500;display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.rev-date{font-size:11px;color:var(--text3);font-weight:500}
.pc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.pc-box{padding:10px 12px;border-radius:var(--radius)}
.pc-box.pos{background:#F6FEF9;border:1px solid #D1FAE5}
.pc-box.neg{background:#FFFBF0;border:1px solid #FDE68A}
.pc-label{font-size:10px;font-weight:700;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px;display:flex;align-items:center;gap:4px}
.pc-box.pos .pc-label{color:#059669}
.pc-box.neg .pc-label{color:#D97706}
.pc-box p{font-size:13px;color:var(--text2);line-height:1.5;font-weight:400}
.advice-box{background:#F8F9FA;border-radius:var(--radius);padding:10px 12px;margin-top:8px;font-size:13px;color:var(--text2);line-height:1.5;border-left:3px solid var(--p-md)}

/* BADGES */
.anon-badge{font-size:11px;padding:2px 8px;border-radius:20px;background:#F5F5F5;color:#999;border:1px solid #E5E5E5;font-weight:600}
.named-badge{font-size:11px;padding:2px 8px;border-radius:20px;background:#EFF6FF;color:#2563EB;border:1px solid #BFDBFE;font-weight:600}
.verified-badge{font-size:11px;padding:2px 8px;border-radius:20px;background:#F0FDF4;color:#15803D;border:1px solid #BBF7D0;font-weight:600}

/* REACTIONS */
.reactions-bar{display:flex;align-items:center;gap:8px;margin-top:12px}
.like-wrap{position:relative;display:inline-block}
.like-btn{background:none;border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;color:var(--text2);display:flex;align-items:center;gap:5px;transition:all 0.15s}
.like-btn:hover,.like-btn.active{border-color:var(--p-md);background:var(--p-pal);color:var(--p-dk)}
.like-emoji{font-size:15px;line-height:1}
.like-label{font-size:12px}
.like-count{font-size:11px;font-weight:700;background:var(--p-pal);color:var(--p-dk);padding:1px 5px;border-radius:8px}
.reaction-picker{position:absolute;bottom:calc(100% + 8px);left:0;background:#fff;border:1px solid var(--border);border-radius:24px;box-shadow:0 8px 24px rgba(0,0,0,0.12);padding:6px 10px;display:none;gap:2px;z-index:50;white-space:nowrap}
.reaction-picker.show{display:flex}
.reaction-picker button{background:none;border:none;cursor:pointer;font-size:22px;padding:4px 5px;border-radius:8px;transition:all 0.15s;line-height:1}
.reaction-picker button:hover{background:var(--bg);transform:scale(1.3)}
.reply-btn{background:none;border:1px solid var(--border);border-radius:20px;padding:5px 12px;cursor:pointer;font-size:12px;color:var(--text2);font-family:'Inter',sans-serif;font-weight:600;display:flex;align-items:center;gap:5px;transition:all 0.15s}
.reply-btn:hover{background:var(--bg);border-color:#CBD5E1}

/* REPLIES */
.replies-section{margin-top:12px;padding-left:16px;border-left:2px solid var(--border)}
.reply-item{padding:8px 0;border-bottom:1px solid var(--border)}
.reply-item:last-child{border-bottom:none}
.reply-meta{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.reply-text{font-size:13px;color:var(--text2);line-height:1.5}
.reply-form{display:flex;gap:8px;margin-top:10px}
.reply-form input{flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);font-family:'Inter',sans-serif;font-size:13px;outline:none}
.reply-form input:focus{border-color:var(--p-lt)}
.reply-form button{background:var(--p-md);color:#fff;border:none;padding:8px 14px;border-radius:var(--radius);font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600}

/* SALARY */
.salary-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.salary-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border)}
.salary-header h3{font-size:18px;font-weight:700}
.salary-card{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border)}
.salary-card:last-child{border-bottom:none}
.salary-pos{font-size:15px;font-weight:700;margin-bottom:4px}
.salary-meta{font-size:12px;color:var(--text2);margin-bottom:8px;display:flex;gap:6px;align-items:center}
.salary-amount{font-size:24px;font-weight:700;color:var(--p-md)}
.salary-range{font-size:12px;color:var(--text3);margin-top:2px}

/* SIDEBAR */
.scard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1rem}
.scard h4{font-size:16px;font-weight:700;margin-bottom:14px}
.info-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.info-row:last-child{border-bottom:none}
.info-label{color:var(--text2);font-weight:500;display:flex;align-items:center;gap:6px}
.info-val{font-weight:700;color:var(--text)}
.btn-full{width:100%;background:var(--p-md);color:#fff;border:none;padding:11px;border-radius:var(--radius);font-size:14px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;margin-bottom:8px}
.btn-full:hover{background:var(--p-dk)}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:12px;padding:1.75rem;width:min(560px,100%);max-height:88vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,0.2)}
.mhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
.mhead h3{font-size:20px;font-weight:700}
.xbtn{background:var(--bg);border:none;font-size:18px;cursor:pointer;color:var(--text2);width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:12px;font-weight:700;margin-bottom:7px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px}
.fg input,.fg textarea{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:var(--radius);background:#fff;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;outline:none}
.fg input:focus,.fg textarea:focus{border-color:var(--p-lt)}
.fg textarea{min-height:90px;resize:vertical}
.starpick{display:flex;gap:8px;margin-top:4px}
.starbtn{background:none;border:none;cursor:pointer;font-size:30px;opacity:0.2;line-height:1;padding:0;color:#F59E0B;transition:all 0.1s}
.starbtn.on{opacity:1}
.vbtns{display:flex;gap:8px;margin-top:4px}
.vbtn{flex:1;padding:9px;border:1px solid var(--border);border-radius:var(--radius);background:none;cursor:pointer;font-size:12px;color:var(--text2);font-family:'Inter',sans-serif;font-weight:600}
.vbtn.sel{border-color:var(--p-lt);background:var(--p-pal);color:var(--p-dk)}
.submit-btn{width:100%;background:var(--p-md);color:#fff;border:none;padding:13px;border-radius:var(--radius);font-size:15px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:700;margin-top:8px}
.submit-btn:hover{background:var(--p-dk)}
.submit-btn:disabled{background:#CBD5E1;cursor:not-allowed}
.anon-toggle{display:flex;gap:8px;margin-top:4px}
.anon-btn{flex:1;padding:10px;border:1px solid var(--border);border-radius:var(--radius);background:none;cursor:pointer;font-size:13px;color:var(--text2);font-family:'Inter',sans-serif;font-weight:600;text-align:center}
.anon-btn.sel{border-color:var(--p-lt);background:var(--p-pal);color:var(--p-dk)}
.auth-tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:1.5rem}
.auth-tab{flex:1;padding:10px;text-align:center;font-size:14px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-2px;border-top:none;border-left:none;border-right:none;background:none;font-family:'Inter',sans-serif;font-weight:600}
.auth-tab.active{color:var(--p-md);border-bottom-color:var(--p-md)}

.loading{text-align:center;padding:4rem;color:var(--text2);font-size:14px}
.spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--p-md);border-radius:50%;animation:spin 0.7s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1C1C1C;color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,0.2)}
.toast.show{opacity:1}
.error-toast{background:#DC2626}
.footer{background:#1C1C1C;color:#6B7280;text-align:center;padding:2rem;font-size:13px;font-weight:500;margin-top:2rem}
.footer strong{color:#fff}
@media(max-width:768px){.page-content{grid-template-columns:1fr}.nav-links{display:none}.pc-grid{grid-template-columns:1fr}.snapshot-stats{grid-template-columns:1fr}}

.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);z-index:100;padding:8px 0 calc(8px + env(safe-area-inset-bottom))}
.mobile-nav-inner{display:flex;justify-content:space-around;align-items:center;max-width:500px;margin:0 auto}
.mobile-nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:4px 12px;border-radius:var(--radius);font-family:'Inter',sans-serif;color:var(--text2);text-decoration:none;transition:color 0.15s}
.mobile-nav-btn:hover{color:var(--p-md)}
.mobile-nav-btn svg{color:currentColor}
.mobile-nav-btn span.lbl{font-size:10px;font-weight:600}
@media(max-width:700px){.mobile-nav{display:block}body{padding-bottom:70px}}

.identity-picker{position:relative;display:inline-block;margin-top:4px;width:100%}
.identity-selected{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius);cursor:pointer;background:#fff;transition:border-color 0.15s;user-select:none}
.identity-selected:hover{border-color:var(--p-mid)}
.identity-avatar-sm{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.identity-avatar-sm.anon{background:linear-gradient(135deg,#a78bfa,#60a5fa);color:#fff}
.identity-avatar-sm.named{background:var(--p-pal);color:var(--p-dk)}
.identity-name-sm{font-size:14px;font-weight:600;color:var(--text);flex:1}
.identity-dropdown-rev{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1.5px solid var(--border);border-radius:var(--radius-lg);box-shadow:0 8px 24px rgba(0,0,0,0.1);z-index:50;overflow:hidden;display:none}
.identity-dropdown-rev.open{display:block}
.identity-section-lbl{font-size:11px;font-weight:700;color:var(--text3);padding:10px 14px 4px;text-transform:uppercase;letter-spacing:0.8px}
.identity-option-rv{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:background 0.1s}
.identity-option-rv:hover{background:var(--bg)}
.identity-option-rv.active{background:var(--p-pal)}
.identity-chk{margin-left:auto;color:var(--p-md);font-size:14px;font-weight:700}

.info-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem 1.5rem;margin-bottom:1rem}
.info-section h4{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.salary-ranges{display:flex;flex-direction:column;gap:8px}

var currentUser=null,currentProfile=null,authMode='login';
var companyId=null,company=null,reviews=[],salaries=[],userReactions={};
var selSt=0,selV='',isAnon=true,activeTab='reviews';
var allReactions={},allReplies={};
var pickerTimers={};

var REACTIONS=[
  {key:'helpful',emoji:'❤️',label:'Faydalı'},

var logoColors=[
  {bg:'#CCFBF1',fc:'#0F766E'},{bg:'#DBEAFE',fc:'#1D4ED8'},
  {bg:'#FEF3C7',fc:'#D97706'},{bg:'#FCE7F3',fc:'#BE185D'},

];

function getColor(n){var i=0;for(var j=0;j<n.length;j++)i+=n.charCodeAt(j);return logoColors[i%logoColors.length];}
function getInitials(n){var w=n.trim().split(' ');return w.length===1?w[0].substring(0,2).toUpperCase():(w[0][0]+w[w.length-1][0]).toUpperCase();}
function starSVG(r,sz){sz=sz||15;return[1,2,3,4,5].map(function(i){var f=i<=Math.floor(r),h=!f&&(i-0.5)<=r,c=f?'#F59E0B':h?'url(#hg)':'#E2E8F0';return'<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 24 24" style="display:inline-block;vertical-align:middle"><defs><linearGradient id="hg"><stop offset="50%" stop-color="#F59E0B"/><stop offset="50%" stop-color="#E2E8F0"/></linearGradient></defs><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26" fill="'+c+'" stroke="none"/></svg>';}).join('');}
function showToast(msg,err){var t=document.getElementById('tst');t.textContent=msg;t.className='toast'+(err?' error-toast':'')+' show';setTimeout(function(){t.className='toast';},3500);}
function fmtDate(d){var m=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'],dt=new Date(d);return dt.getDate()+' '+m[dt.getMonth()]+' '+dt.getFullYear();}
function fmtSalary(amount,currency){var sym={TRY:'₺',USD:'$',EUR:'€'};return(sym[currency]||'')+Number(amount).toLocaleString('tr-TR');}

var isFollowing=false;

async function checkFollow(){
  if(!currentUser||!companyId)return;
  var r=await sb.from('company_follows').select('id').eq('company_id',companyId).eq('user_id',currentUser.id).single();
  isFollowing=!!(r.data);
  var btn=document.getElementById('followBtn');
  if(btn){btn.textContent=isFollowing?'✓ Takip Ediliyor':'Takip Et';btn.style.background=isFollowing?'#F0FDF4':'';btn.style.color=isFollowing?'#15803D':'';}
}

async function toggleFollow(){
  if(!currentUser){openAuth('login');return;}
  var btn=document.getElementById('followBtn');
  try{
    if(isFollowing){
      await sb.from('company_follows').delete().eq('company_id',companyId).eq('user_id',currentUser.id);
      isFollowing=false;
      if(btn){btn.textContent='Takip Et';btn.style.background='';btn.style.color='';}
      showToast('Takip bırakıldı.');
    }else{
      await sb.from('company_follows').insert({company_id:companyId,user_id:currentUser.id});
      isFollowing=true;
      if(btn){btn.textContent='✓ Takip Ediliyor';btn.style.background='#F0FDF4';btn.style.color='#15803D';}
      showToast('Şirket takip edildi!');
    }
  }catch(e){showToast('Bir hata oluştu.',true);}
}

async function initAuth(){
  var s=await sb.auth.getSession();
  if(s.data.session) await onLogin(s.data.session.user);
  sb.auth.onAuthStateChange(async function(ev,session){if(session) await onLogin(session.user);else onLogout();});
}
async function onLogin(user){
  currentUser=user;
  var p=await sb.from('profiles').select('*').eq('id',user.id).single();
  currentProfile=p.data;renderNav();checkFollow();updateCRevPicker();
  var el=document.getElementById('previewUsername');
  if(el)el.textContent=currentProfile&&currentProfile.username?currentProfile.username:user.email.split('@')[0];
}
function onLogout(){currentUser=null;currentProfile=null;renderNav();}
function renderNav(){
  var nr=document.getElementById('navRight');
  if(currentUser){
    var uname=currentProfile&&currentProfile.username?currentProfile.username:currentUser.email.split('@')[0];
    nr.innerHTML='<div class="user-menu"><div class="user-avatar" onclick="toggleDD()">'+uname.substring(0,2).toUpperCase()+'</div><div class="user-dropdown" id="userDD"><a style="font-weight:700;color:var(--text);cursor:default">'+uname+'</a><div class="divider"></div><a href="index.html">Ana Sayfa</a><div class="divider"></div><a onclick="doLogout()" style="color:#DC2626">Çıkış Yap</a></div></div>';
  }else{nr.innerHTML='<button class="btn-ghost" onclick="openAuth(\'login\')">Giriş Yap</button><button class="btn-primary" onclick="openAuth(\'register\')">Üye Ol</button>';}
}
function toggleDD(){var d=document.getElementById('userDD');if(d)d.classList.toggle('open');}
async function doLogout(){await sb.auth.signOut();showToast('Çıkış yapıldı.');}
function openAuth(mode){authMode=mode||'login';switchTab(authMode);document.getElementById('authModal').classList.add('open');}
function switchTab(mode){
  authMode=mode;
  document.getElementById('tab-login').classList.toggle('active',mode==='login');
  document.getElementById('tab-register').classList.toggle('active',mode==='register');
  document.getElementById('authTitle').textContent=mode==='login'?'Giriş Yap':'Üye Ol';
  document.getElementById('authBtn').textContent=mode==='login'?'Giriş Yap':'Üye Ol';
  document.getElementById('usernameField').style.display=mode==='register'?'block':'none';
  document.getElementById('authNote').innerHTML=mode==='login'?'Hesabınız yok mu? <a onclick="switchTab(\'register\')" style="color:var(--p-md);cursor:pointer;font-weight:700">Üye olun</a>':'Zaten üye misiniz? <a onclick="switchTab(\'login\')" style="color:var(--p-md);cursor:pointer;font-weight:700">Giriş yapın</a>';
}
async function handleAuth(){
  var email=document.getElementById('authEmail').value.trim(),pass=document.getElementById('authPassword').value;
  var btn=document.getElementById('authBtn');
  if(!email||!pass){showToast('E-posta ve şifre zorunlu.',true);return;}
  btn.disabled=true;btn.textContent='Bekleyin...';
  try{
    if(authMode==='register'){
      var username=document.getElementById('authUsername').value.trim();
      var r=await sb.auth.signUp({email:email,password:pass});
      if(r.error)throw r.error;
      if(username&&r.data.user){await new Promise(function(res){setTimeout(res,1500);});await sb.from('profiles').upsert({id:r.data.user.id,username:username},{onConflict:'id'});}
      showToast('Kayıt başarılı!');closeM('authModal');
    }else{
      var r=await sb.auth.signInWithPassword({email:email,password:pass});
      if(r.error)throw r.error;
      showToast('Hoş geldiniz!');closeM('authModal');
    }
  }catch(e){var msg=e.message||'Hata.';if(msg.includes('Invalid login'))msg='E-posta veya şifre hatalı.';showToast(msg,true);}
  btn.disabled=false;btn.textContent=authMode==='login'?'Giriş Yap':'Üye Ol';
}
function requireAuth(fn){if(!currentUser){openAuth('login');return;}fn();}
function closeM(id){document.getElementById(id).classList.remove('open');}

async function loadPage(){
  var params=new URLSearchParams(window.location.search);
  companyId=params.get('id');
  if(!companyId){window.location.href='index.html';return;}
  try{
    var cRes=await sb.from('companies').select('*').eq('id',companyId).single();
    if(!cRes.data){window.location.href='index.html';return;}
    company=cRes.data;
    document.title=company.name+' Yorumları — şirketiniyorumla.com';
    var revRes=await sb.from('reviews').select('*, profiles(username, title, is_verified)').eq('company_id',companyId).order('created_at',{ascending:false});
    reviews=revRes.data||[];
    var salRes=await sb.from('salaries').select('*').eq('company_id',companyId).order('created_at',{ascending:false});
    salaries=salRes.data||[];
    if(reviews.length){
      var revIds=reviews.map(function(r){return r.id;});
      var reacRes=await sb.from('review_reactions').select('*').in('review_id',revIds);
      allReactions={};
      (reacRes.data||[]).forEach(function(r){
        if(!allReactions[r.review_id])allReactions[r.review_id]={};
        if(!allReactions[r.review_id][r.reaction])allReactions[r.review_id][r.reaction]=0;
        allReactions[r.review_id][r.reaction]++;
        if(currentUser&&r.user_id===currentUser.id)userReactions[r.review_id]=r.reaction;
      });
      var repRes=await sb.from('review_replies').select('*, profiles(username)').in('review_id',revIds).order('created_at',{ascending:true});
      allReplies={};
      (repRes.data||[]).forEach(function(r){
        if(!allReplies[r.review_id])allReplies[r.review_id]=[];
        allReplies[r.review_id].push(r);
      });
    }
    renderPage();
  }catch(e){console.error(e);document.getElementById('pageContent').innerHTML='<div class="loading"><p>Yüklenemedi.</p></div>';}
}

function updateMeta(){
  if(!company)return;
  // Schema.org structured data
  var avg=reviews.length?reviews.reduce(function(s,r){return s+r.rating;},0)/reviews.length:0;
  if(reviews.length>0){
    var schema={
      "@context":"https://schema.org",
      "@type":"Organization",
      "name":company.name,
      "aggregateRating":{
        "@type":"AggregateRating",
        "ratingValue":avg.toFixed(1),
        "reviewCount":reviews.length,
        "bestRating":"5",
        "worstRating":"1"
      }
    };
    var existing=document.getElementById('schema-org');
    if(existing)existing.remove();
    var s=document.createElement('script');
    s.type='application/ld+json';
    s.id='schema-org';
    s.textContent=JSON.stringify(schema);
    document.head.appendChild(s);
  }
  var avg=reviews.length?reviews.reduce(function(s,r){return s+r.rating;},0)/reviews.length:0;
  var title=company.name+' Yorumları'+(reviews.length>0?' — '+avg.toFixed(1)+' puan, '+reviews.length+' değerlendirme':'')+' | şirketiniyorumla.com';
  var desc=company.name+(company.sector?' ('+company.sector+')':'')+' hakkında '+reviews.length+' çalışan yorumu'+(reviews.length>0?', ortalama '+avg.toFixed(1)+'/5 puan':'')+'. '+(company.salary_range?'Güncel maaş bilgileri. ':'')+' İş yeri değerlendirmeleri ve yan haklar.';
  document.title=title;
  var dm=document.getElementById('meta-desc');if(dm)dm.setAttribute('content',desc);
  var ot=document.getElementById('og-title');if(ot)ot.setAttribute('content',title);
  var od=document.getElementById('og-desc');if(od)od.setAttribute('content',desc);
}
function renderPage(){
  var col=getColor(company.name),ini=getInitials(company.name);
  var avg=reviews.length?reviews.reduce(function(s,r){return s+r.rating;},0)/reviews.length:0;
  var rec=reviews.length?Math.round(reviews.filter(function(r){return r.recommend==='yes';}).length/reviews.length*100):0;
  var html='';

  // COVER
  html+='<div class="company-cover"><div class="company-cover-bg"></div><div class="company-cover-pattern"></div><div class="company-cover-overlay"></div></div>';

  // HEADER
  html+='<div class="company-header-wrap"><div class="company-header-inner">';
  html+='<div class="company-logo-wrap">';
  html+='<div class="company-logo-big" style="background:'+col.bg+';color:'+col.fc+'">'+ini+'</div>';
  html+='<div class="company-title-row">';
  html+='<div><div class="company-name">'+company.name+'</div>';
  html+='<div class="company-badges">';
  if(reviews.length>0)html+='<span class="company-badge verified">✓ Doğrulanmış Şirket</span>';
  if(company.sector)html+='<span class="company-badge">'+company.sector+'</span>';
  if(company.city)html+='<span class="company-badge">📍 '+company.city+'</span>';
  html+='</div></div>';
  html+='<div class="company-actions">';
  html+='<button class="btn-review" onclick="requireAuth(openRevModal)">+ Yorum Yaz</button>';
  html+='<button class="btn-follow" id="followBtn" onclick="toggleFollow()">Takip Et</button>';
  html+='</div></div></div>';

  // TABS
  html+='<div class="company-tabs"><div class="tabs-inner">';
  html+='<button class="tab-btn active" id="tab-overview" onclick="switchTab2(\'overview\')">Genel Bakış</button>';
  html+='<button class="tab-btn" id="tab-reviews-btn" onclick="switchTab2(\'reviews\')">Yorumlar ('+reviews.length+')</button>';
  html+='<button class="tab-btn" id="tab-salaries-btn" onclick="switchTab2(\'salaries\')">Maaşlar ('+salaries.length+')</button>';
  html+='</div></div>';
  html+='</div></div>';

  // CONTENT
  html+='<div class="page-content">';
  html+='<div id="main-content">';

  // OVERVIEW TAB
  html+='<div id="tab-content-overview">';
  // Snapshot
  // Hero rating card
  html+='<div class="snapshot-card">';
  // Description
  if(company.description){
    html+='<p style="font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:1.25rem;font-weight:400">'+company.description+'</p>';
  }
  html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:12px">';
  html+='<div style="font-size:17px;font-weight:700;color:var(--text)">'+company.name+' Özeti</div>';
  if(avg>0)html+='<div style="display:flex;align-items:center;gap:10px"><div style="font-size:42px;font-weight:800;color:var(--text);line-height:1">'+avg.toFixed(1)+'</div><div><div style="color:#F59E0B;font-size:18px;letter-spacing:2px">'+('★'.repeat(Math.round(avg))+'☆'.repeat(5-Math.round(avg)))+'</div><div style="font-size:12px;color:var(--text2);font-weight:500;margin-top:2px">'+reviews.length+' değerlendirme</div></div></div>';
  html+='</div>';
  html+='<div class="snapshot-grid" style="background:var(--bg);border-radius:var(--radius-lg);padding:1rem;">';
  if(reviews.length>0){
  
    html+='<div class="snapshot-item"><div style="width:40px;height:40px;border-radius:10px;background:#F0FDF4;display:flex;align-items:center;justify-content:center;font-size:18px">👍</div><div><div class="snapshot-val" style="color:#15803D">%'+rec+'</div><div class="snapshot-label">Tavsiye eder</div></div></div>';
  }
  if(company.size)html+='<div class="snapshot-item"><div style="width:40px;height:40px;border-radius:10px;background:#EFF6FF;display:flex;align-items:center;justify-content:center;font-size:18px">👥</div><div><div class="snapshot-val">'+company.size+'</div><div class="snapshot-label">Çalışan</div></div></div>';
  if(company.founded_year)html+='<div class="snapshot-item"><div style="width:40px;height:40px;border-radius:10px;background:#FEF3C7;display:flex;align-items:center;justify-content:center;font-size:18px">📅</div><div><div class="snapshot-val">'+company.founded_year+'</div><div class="snapshot-label">Kuruluş</div></div></div>';

async function toggleReaction(reviewId,reaction,likeBtn){
  if(!currentUser){openAuth('login');return;}
  var myReaction=userReactions[reviewId];
  var lb=likeBtn||document.getElementById('likebtn-'+reviewId);
  try{
    if(myReaction===reaction){
      await sb.from('review_reactions').delete().eq('review_id',reviewId).eq('user_id',currentUser.id);
      delete userReactions[reviewId];
      lb.classList.remove('active');
      lb.querySelector('.like-emoji').textContent='🤍';
      lb.querySelector('.like-label').textContent='Beğen';
      var cnt=lb.querySelector('.like-count');
      if(cnt){var n=parseInt(cnt.textContent)-1;if(n<=0)cnt.remove();else cnt.textContent=n;}
    }else{
      if(myReaction)await sb.from('review_reactions').delete().eq('review_id',reviewId).eq('user_id',currentUser.id);
      await sb.from('review_reactions').insert({review_id:reviewId,user_id:currentUser.id,reaction:reaction});
      var prev=myReaction;userReactions[reviewId]=reaction;
      var rx=REACTIONS.find(function(r){return r.key===reaction;});
      lb.classList.add('active');
      lb.querySelector('.like-emoji').textContent=rx.emoji;
      lb.querySelector('.like-label').textContent=rx.label;
      var cnt=lb.querySelector('.like-count');
      if(!prev){if(cnt){cnt.textContent=parseInt(cnt.textContent)+1;}else{lb.insertAdjacentHTML('beforeend','<span class="like-count">1</span>');}}
    }
  }catch(e){showToast('İşlem yapılamadı.',true);}
}

async function submitReplyC(reviewId){
  if(!currentUser){openAuth('login');return;}
  var input=document.getElementById('reply-input-'+reviewId);
  var content=input.value.trim();
  if(!content){showToast('Cevap boş olamaz.',true);return;}
  try{
    var r=await sb.from('review_replies').insert({review_id:reviewId,user_id:currentUser.id,content:content,is_anonymous:false});
    if(r.error)throw r.error;
    input.value='';showToast('Cevabınız eklendi!');
    var div=document.getElementById('replies-'+reviewId);
    if(div){var u=currentProfile&&currentProfile.username?currentProfile.username:'Kullanıcı';div.insertAdjacentHTML('beforeend','<div class="reply-item"><div class="reply-meta"><span class="named-badge">'+u+'</span></div><div class="reply-text">'+content+'</div></div>');}
  }catch(e){showToast('Cevap gönderilemedi.',true);}
}

  var btn=document.getElementById('submitBtn');btn.disabled=true;btn.textContent='Gönderiliyor...';
  try{
    var r=await sb.from('reviews').insert({company_id:companyId,user_id:currentUser.id,is_anonymous:isAnon,position:document.getElementById('posi').value.trim()||null,rating:selSt,recommend:selV||null,pros:document.getElementById('pti').value.trim()||null,cons:document.getElementById('cti').value.trim()||null,advice:document.getElementById('advi').value.trim()||null});
    if(r.error)throw r.error;
    closeM('revModal');showToast(isAnon?'✓ Anonim yorumunuz gönderildi!':'✓ Yorumunuz yayınlandı!');
    ['posi','pti','cti','advi'].forEach(function(id){document.getElementById(id).value='';});
    setSt(0);setV('');setAnon(true);
    await loadPage();
  }catch(e){showToast('Bir hata oluştu.',true);console.error(e);}
  btn.disabled=false;btn.textContent=isAnon?'Anonim Olarak Gönder':'İsimli Olarak Gönder';
}

document.querySelectorAll('.overlay').forEach(function(el){el.addEventListener('click',function(e){if(e.target===el)el.classList.remove('open');});});
document.addEventListener('click',function(e){if(!e.target.closest('#cRevPicker')){var rd=document.getElementById('cRevDD');if(rd)rd.classList.remove('open');}if(!e.target.closest('.user-menu')){var dd=document.getElementById('userDD');if(dd)dd.classList.remove('open');}});

initAuth();loadPage();
</script>
