<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profilim — şirketiniyorumla.com</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --p-dk:#0D5C55;--p-md:#0F766E;--p-lt:#14B8A6;
  --p-pal:#CCFBF1;--p-mid:#5EEAD4;
  --accent:#22C55E;--blue:#3B82F6;--blue-pal:#EFF6FF;
  --bg:#F8FAFC;--surface:#fff;--border:#E2E8F0;
  --text:#111827;--text2:#6B7280;--text3:#9CA3AF;
  --radius:8px;--radius-lg:12px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:100}
.logo{font-family:'Inter',sans-serif;font-size:20px;font-weight:800;color:#0D5C55;letter-spacing:-0.8px;text-decoration:none}
.logo span{color:var(--p-lt)}
.nav-links{display:flex;gap:24px;align-items:center}
.nav-links a{font-size:14px;color:var(--text2);text-decoration:none;cursor:pointer;font-weight:500}
.nav-links a:hover{color:var(--text)}
.nav-right{display:flex;gap:8px;align-items:center}
.user-menu{position:relative}
.user-avatar{width:34px;height:34px;border-radius:50%;background:var(--p-pal);color:var(--p-dk);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;cursor:pointer;border:2px solid var(--p-mid)}
.user-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:0 8px 24px rgba(0,0,0,0.1);min-width:200px;z-index:100;display:none;overflow:hidden}
.user-dropdown.open{display:block}
.user-dropdown a{display:block;padding:10px 16px;font-size:13px;color:var(--text2);cursor:pointer;font-weight:500}
.user-dropdown a:hover{background:var(--bg);color:var(--text)}
.user-dropdown .divider{height:1px;background:var(--border)}
.profile-header{background:var(--surface);border-bottom:1px solid var(--border);padding:2rem}
.profile-header-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap}
.profile-avatar-big{width:72px;height:72px;border-radius:50%;background:var(--p-pal);color:var(--p-dk);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;border:3px solid var(--p-mid);flex-shrink:0}
.profile-info h1{font-size:24px;font-weight:700;margin-bottom:6px;letter-spacing:-0.3px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.verified-badge{font-size:11px;padding:3px 10px;border-radius:20px;background:#DCFCE7;color:#15803D;border:1px solid #BBF7D0;font-weight:600}
.profile-email{font-size:13px;color:var(--text2);font-weight:500}
.profile-stats{margin-left:auto;display:flex;gap:2rem;flex-shrink:0}
.profile-stat{text-align:center}
.profile-stat-val{font-size:22px;font-weight:700;color:var(--p-md)}
.profile-stat-label{font-size:12px;color:var(--text2);font-weight:500;margin-top:2px}
.tabs-bar{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:58px;z-index:90}
.tabs-inner{max-width:900px;margin:0 auto;padding:0 2rem;display:flex}
.tab-btn{padding:14px 20px;font-size:14px;font-weight:600;color:var(--text2);border-bottom:2px solid transparent;cursor:pointer;background:none;border-top:none;border-left:none;border-right:none;font-family:'Inter',sans-serif;transition:all 0.15s}
.tab-btn.active{color:var(--p-md);border-bottom-color:var(--p-md)}
.content{max-width:900px;margin:0 auto;padding:1.5rem 2rem}
.rev-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:10px}
.card-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.clogo{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;border:1px solid var(--border)}
.clink{font-size:14px;font-weight:700;color:var(--p-md);text-decoration:none}
.clink:hover{text-decoration:underline}
.cmeta-small{font-size:12px;color:var(--text2);font-weight:500}
.card-date{font-size:11px;color:var(--text3);font-weight:500;margin-left:auto}
.anon-badge{font-size:10px;padding:2px 8px;border-radius:20px;background:#F1F5F9;color:var(--text3);border:1px solid var(--border);font-weight:600}
.named-badge{font-size:10px;padding:2px 8px;border-radius:20px;background:var(--blue-pal);color:var(--blue);border:1px solid #BFDBFE;font-weight:600}
.rec-tag{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:600}
.rec-yes{background:#F0FDF4;color:#15803D;border:1px solid #BBF7D0}
.rec-no{background:#FFF7ED;color:#C2410C;border:1px solid #FED7AA}
.pc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.pc-box{border-radius:var(--radius);padding:10px 12px}
.pc-box.pos{background:#F0FDF4;border:1px solid #BBF7D0}
.pc-box.neg{background:#FFF7ED;border:1px solid #FED7AA}
.pc-label{font-size:10px;font-weight:700;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px}
.pc-box.pos .pc-label{color:#15803D}
.pc-box.neg .pc-label{color:#C2410C}
.pc-box p{font-size:12px;color:var(--text2);line-height:1.5}
.advice-box{background:var(--bg);border-radius:0;padding:10px 12px;margin-top:8px;font-size:12px;color:var(--text2);line-height:1.5;border-left:3px solid var(--accent)}
.sal-amount{font-size:22px;font-weight:700;color:var(--p-md)}
.sal-position{font-size:14px;font-weight:600;margin-bottom:6px}
.sal-meta{font-size:12px;color:var(--text2);display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:4px}
.follow-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:10px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all 0.15s;text-decoration:none}
.follow-card:hover{border-color:var(--p-mid);transform:translateY(-1px);box-shadow:0 4px 16px rgba(15,118,110,0.08)}
.follow-logo{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0;border:1px solid var(--border)}
.follow-name{font-size:15px;font-weight:700;color:var(--text);margin-bottom:2px}
.follow-meta{font-size:12px;color:var(--text2);font-weight:500}
.follow-rating{margin-left:auto;text-align:right}
.follow-rating-val{font-size:20px;font-weight:700;color:var(--p-md)}
.follow-rating-label{font-size:11px;color:var(--text3);font-weight:500}
.empty{text-align:center;padding:3rem 1rem}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty h3{font-size:16px;font-weight:700;margin-bottom:6px}
.empty p{font-size:13px;color:var(--text3);font-weight:500;margin-bottom:14px}
.empty-btn{display:inline-block;background:var(--p-md);color:#fff;padding:10px 20px;border-radius:var(--radius);font-size:14px;font-weight:600;text-decoration:none;font-family:'Inter',sans-serif}
.loading{text-align:center;padding:4rem;color:var(--text2)}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--p-md);border-radius:50%;animation:spin 0.7s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{background:#111827;color:#6B7280;text-align:center;padding:2rem;font-size:13px;font-weight:500;margin-top:2rem}
.footer strong{color:#fff;font-weight:700}
@media(max-width:700px){.nav-links{display:none}.profile-stats{margin-left:0;width:100%}.pc-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<nav class="nav">
  <a class="logo" href="index.html">şirketini<span>yorumla</span></a>
  <div class="nav-links">
    <a href="index.html">Şirketler</a>
    <a href="forum.html">Forum</a>
  </div>
  <div class="nav-right" id="navRight"></div>
</nav>

<div id="profileHeader"></div>

<div class="tabs-bar">
  <div class="tabs-inner">
    <button class="tab-btn active" id="tab-reviews" onclick="switchTab('reviews')">Yorumlarım</button>
    <button class="tab-btn" id="tab-salaries" onclick="switchTab('salaries')">Maaş Verilerim</button>
    <button class="tab-btn" id="tab-follows" onclick="switchTab('follows')">Takip Ettiklerim</button>
  </div>
</div>

<div class="content">
  <div id="tab-content-reviews"><div class="loading"><div class="spinner"></div><br>Yükleniyor...</div></div>
  <div id="tab-content-salaries" style="display:none"></div>
  <div id="tab-content-follows" style="display:none"></div>
</div>

<footer class="footer"><strong>şirketiniyorumla.com</strong> &nbsp;·&nbsp; © 2026</footer>

<script>
var sb=window.supabase.createClient(
  'https://lduzxgmmmzldigbvzmpt.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxkdXp4Z21tbXpsZGlnYnZ6bXB0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODYzMDYsImV4cCI6MjA4OTg2MjMwNn0.7jlnzw7mHe5g2tnLHJYdyk5QBQKWtDQknQCrZplvHDg',
  {auth:{storageKey:'sirketiniyorumla-auth',storage:window.localStorage}}
);

var currentUser=null,currentProfile=null;

var logoColors=[
  {bg:'#CCFBF1',fc:'#0F766E'},{bg:'#DBEAFE',fc:'#1D4ED8'},
  {bg:'#FEF3C7',fc:'#D97706'},{bg:'#FCE7F3',fc:'#BE185D'},
  {bg:'#EDE9FE',fc:'#7C3AED'},{bg:'#DCFCE7',fc:'#15803D'},
  {bg:'#FEE2E2',fc:'#DC2626'},{bg:'#F0FDF4',fc:'#166534'}
];

function getColor(n){var i=0;for(var j=0;j<n.length;j++)i+=n.charCodeAt(j);return logoColors[i%logoColors.length];}
function getInitials(n){var w=n.trim().split(' ');return w.length===1?w[0].substring(0,2).toUpperCase():(w[0][0]+w[w.length-1][0]).toUpperCase();}
function starSVG(r,sz){sz=sz||13;return[1,2,3,4,5].map(function(i){var f=i<=Math.floor(r),c=f?'#F59E0B':'#E2E8F0';return'<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 24 24" style="display:inline-block;vertical-align:middle"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26" fill="'+c+'" stroke="none"/></svg>';}).join('');}
function fmtDate(d){var m=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'],dt=new Date(d);return dt.getDate()+' '+m[dt.getMonth()]+' '+dt.getFullYear();}
function fmtSalary(a,c){var s={TRY:'₺',USD:'$',EUR:'€'};return(s[c]||'')+Number(a).toLocaleString('tr-TR');}

async function init(){
  var s=await sb.auth.getSession();
  if(!s.data.session){window.location.href='index.html';return;}
  currentUser=s.data.session.user;
  var p=await sb.from('profiles').select('*').eq('id',currentUser.id).single();
  currentProfile=p.data;
  renderNav();
  loadAll();
}

function renderNav(){
  var uname=currentProfile&&currentProfile.username?currentProfile.username:currentUser.email.split('@')[0];
  document.getElementById('navRight').innerHTML='<div class="user-menu"><div class="user-avatar" onclick="toggleDD()">'+uname.substring(0,2).toUpperCase()+'</div><div class="user-dropdown" id="userDD"><a style="font-weight:700;color:var(--text);cursor:default">'+uname+'</a><div class="divider"></div><a href="index.html">Ana Sayfa</a><a href="profile.html" style="color:var(--p-md);font-weight:700">Profilim</a><div class="divider"></div><a onclick="doLogout()" style="color:#DC2626">Çıkış Yap</a></div></div>';
}
function toggleDD(){var d=document.getElementById('userDD');if(d)d.classList.toggle('open');}
async function doLogout(){await sb.auth.signOut();window.location.href='index.html';}

async function loadAll(){
  var uname=currentProfile&&currentProfile.username?currentProfile.username:currentUser.email.split('@')[0];
  var verified=currentProfile&&currentProfile.is_verified;

  var results=await Promise.all([
    sb.from('reviews').select('*, companies(id,name,sector,city)').eq('user_id',currentUser.id).order('created_at',{ascending:false}),
    sb.from('salaries').select('*, companies(id,name,sector,city)').eq('user_id',currentUser.id).order('created_at',{ascending:false}),
    sb.from('company_follows').select('*, companies(id,name,sector,city,reviews(rating))').eq('user_id',currentUser.id).order('created_at',{ascending:false})
  ]);

  var reviews=results[0].data||[];
  var salaries=results[1].data||[];
  var follows=results[2].data||[];

  // Header
  document.getElementById('profileHeader').innerHTML=
    '<div class="profile-header"><div class="profile-header-inner">'+
    '<div class="profile-avatar-big">'+uname.substring(0,2).toUpperCase()+'</div>'+
    '<div class="profile-info"><h1>'+uname+(verified?' <span class="verified-badge">✓ Doğrulanmış</span>':'')+'</h1>'+
    '<div class="profile-email">'+currentUser.email+'</div></div>'+
    '<div class="profile-stats">'+
    '<div class="profile-stat"><div class="profile-stat-val">'+reviews.length+'</div><div class="profile-stat-label">Yorum</div></div>'+
    '<div class="profile-stat"><div class="profile-stat-val">'+salaries.length+'</div><div class="profile-stat-label">Maaş</div></div>'+
    '<div class="profile-stat"><div class="profile-stat-val">'+follows.length+'</div><div class="profile-stat-label">Takip</div></div>'+
    '</div></div></div>';

  // Reviews
  var rh='';
  if(reviews.length){
    reviews.forEach(function(r){
      var c=r.companies||{name:'?'};
      var col=getColor(c.name);var ini=getInitials(c.name);
      rh+='<div class="rev-card">';
      rh+='<div class="card-top"><div class="clogo" style="background:'+col.bg+';color:'+col.fc+'">'+ini+'</div>';
      rh+='<div><a class="clink" href="company.html?id='+c.id+'">'+c.name+'</a><div class="cmeta-small">'+(c.sector||'—')+' · '+(c.city||'—')+'</div></div>';
      rh+='<span class="card-date">'+fmtDate(r.created_at)+'</span></div>';
      rh+='<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px">';
      rh+=starSVG(r.rating,14)+' <span style="font-size:16px;font-weight:700">'+r.rating+'.0</span>';
      if(r.position)rh+='<span style="font-size:13px;color:var(--text2)">'+r.position+'</span>';
      if(r.recommend==='yes')rh+='<span class="rec-tag rec-yes">Tavsiye Eder</span>';
      else if(r.recommend==='no')rh+='<span class="rec-tag rec-no">Tavsiye Etmez</span>';
      rh+=r.is_anonymous!==false?'<span class="anon-badge">anonim</span>':'<span class="named-badge">isimli</span>';
      rh+='</div>';
      if(r.pros||r.cons){rh+='<div class="pc-grid">';if(r.pros)rh+='<div class="pc-box pos"><div class="pc-label">✅ Olumlu</div><p>'+r.pros+'</p></div>';if(r.cons)rh+='<div class="pc-box neg"><div class="pc-label">⚠️ Geliştirilmeli</div><p>'+r.cons+'</p></div>';rh+='</div>';}
      if(r.advice)rh+='<div class="advice-box"><strong style="color:var(--p-md);font-weight:700">Yönetime:</strong> '+r.advice+'</div>';
      rh+='</div>';
    });
  }else{
    rh='<div class="empty"><div class="empty-icon">📝</div><h3>Henüz yorum yazmadınız</h3><p>Çalıştığınız şirketleri değerlendirin.</p><a class="empty-btn" href="index.html">Yorum Yaz</a></div>';
  }
  document.getElementById('tab-content-reviews').innerHTML=rh;

  // Salaries
  var sh='';
  if(salaries.length){
    salaries.forEach(function(s){
      var c=s.companies||{name:'?'};
      var col=getColor(c.name);var ini=getInitials(c.name);
      sh+='<div class="rev-card">';
      sh+='<div class="card-top"><div class="clogo" style="background:'+col.bg+';color:'+col.fc+'">'+ini+'</div>';
      sh+='<div><a class="clink" href="company.html?id='+c.id+'">'+c.name+'</a><div class="cmeta-small">'+(c.sector||'—')+' · '+(c.city||'—')+'</div></div>';
      sh+='<span class="card-date">'+fmtDate(s.created_at)+'</span></div>';
      sh+='<div class="sal-position">'+s.position+'</div>';
      sh+='<div class="sal-amount">'+fmtSalary(s.salary,s.currency)+'</div>';
      sh+='<div class="sal-meta">';
      if(s.experience_years)sh+='<span>'+s.experience_years+' yıl deneyim</span>';
      if(s.city)sh+='<span>'+s.city+'</span>';
      sh+=s.is_anonymous!==false?'<span class="anon-badge">anonim</span>':'<span class="named-badge">isimli</span>';
      sh+='</div></div>';
    });
  }else{
    sh='<div class="empty"><div class="empty-icon">💰</div><h3>Henüz maaş verisi eklemediniz</h3><p>Maaş verisi paylaşarak topluluğa katkıda bulunun.</p><a class="empty-btn" href="index.html">Maaş Ekle</a></div>';
  }
  document.getElementById('tab-content-salaries').innerHTML=sh;

  // Follows
  var fh='';
  if(follows.length){
    follows.forEach(function(f){
      var c=f.companies||{name:'?'};
      var col=getColor(c.name);var ini=getInitials(c.name);
      var revs=c.reviews||[];
      var avg=revs.length?revs.reduce(function(s,r){return s+r.rating;},0)/revs.length:0;
      fh+='<a class="follow-card" href="company.html?id='+c.id+'">';
      fh+='<div class="follow-logo" style="background:'+col.bg+';color:'+col.fc+'">'+ini+'</div>';
      fh+='<div><div class="follow-name">'+c.name+'</div><div class="follow-meta">'+(c.sector||'—')+' · '+(c.city||'—')+'</div></div>';
      if(avg>0)fh+='<div class="follow-rating"><div class="follow-rating-val">'+avg.toFixed(1)+'</div><div class="follow-rating-label">'+revs.length+' yorum</div></div>';
      fh+='</a>';
    });
  }else{
    fh='<div class="empty"><div class="empty-icon">🔔</div><h3>Henüz şirket takip etmediniz</h3><p>Şirket sayfalarından takip ederek güncel kalın.</p><a class="empty-btn" href="index.html">Keşfet</a></div>';
  }
  document.getElementById('tab-content-follows').innerHTML=fh;
}

function switchTab(tab){
  ['reviews','salaries','follows'].forEach(function(t){
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
    document.getElementById('tab-content-'+t).style.display=t===tab?'block':'none';
  });
}

document.addEventListener('click',function(e){if(!e.target.closest('.user-menu')){var dd=document.getElementById('userDD');if(dd)dd.classList.remove('open');}});
init();
</script>
</body>
</html>
